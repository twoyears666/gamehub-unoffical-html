<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>带派游戏</title>

    <!-- PWA 基础配置 -->
    <meta name="theme-color" content="#121212">
    <link rel="manifest" href="#webManifest">

    <!-- iOS 专用 PWA 配置 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="带派游戏">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="icon.png">

    <style>
        /* --- 基础重置 --- */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 20px;
            padding-top: env(safe-area-inset-top);
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* --- 顶部标题 --- */
        header {
            margin-bottom: 20px;
            text-align: left;
        }
        h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 0;
            color: #fff;
        }

        /* --- 网格布局 (恢复为 Flex 布局) --- */
        .grid {
            display: flex;
            flex-wrap: wrap;
            gap: 20px; /* 间距 */
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            align-content: flex-start;
        }

        /* --- 卡片样式 (恢复为正方形) --- */
        .card {
            background-color: #1e1e1e;
            border-radius: 16px;
            overflow: hidden;
            text-decoration: none;
            color: inherit;
            transition: transform 0.2s, opacity 0.2s;
            display: flex;
            flex-direction: column;
            position: relative;
            /* 宽度设为 22%，大约一行 4 个 */
            width: 22%;
            aspect-ratio: 1 / 1; /* 强制正方形 */
        }
        .card:active {
            transform: scale(0.96);
            opacity: 0.8;
        }

        /* 图片区域 */
        .card-img-container {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #2a2a2a;
            position: relative;
        }
        .card-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s;
        }
        .card:hover .card-img {
            transform: scale(1.05);
        }

        /* 文字信息区域 (底部渐变) */
        .card-info {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 15px;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            text-align: left;
            z-index: 2;
        }
        .card-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            text-shadow: 0 1px 2px rgba(0,0,0,0.8);
        }
        .card-desc {
            font-size: 12px;
            color: #ddd;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-shadow: 0 1px 2px rgba(0,0,0,0.8);
        }

        /* --- 添加按钮 (加号) --- */
        .add-card {
            background-color: #1e1e1e;
            border: 2px dashed #444;
            justify-content: center;
            align-items: center;
            display: flex; /* 修复：确保内容居中 */
        }
        .add-card:hover {
            background-color: #252525;
            border-color: #666;
        }
        .add-icon {
            font-size: 40px;
            color: #666;
            font-weight: 300;
        }
        .add-text {
            margin-top: 8px;
            font-size: 14px;
            color: #666;
        }

        /* --- 弹窗样式 --- */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(4px);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.2s;
        }
        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        .modal {
            background: #1e1e1e;
            width: 90%;
            max-width: 400px;
            border-radius: 20px;
            padding: 24px;
            transform: scale(0.9);
            transition: transform 0.2s;
        }
        .modal-overlay.active .modal {
            transform: scale(1);
        }
        .modal h2 {
            margin-bottom: 20px;
            font-size: 20px;
            text-align: center;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #aaa;
        }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px;
            background: #2a2a2a;
            border: 1px solid #333;
            border-radius: 10px;
            color: #fff;
            font-size: 14px;
            outline: none;
        }
        .form-group input:focus {
            border-color: #fff;
        }
        .btn-group {
            display: flex;
            gap: 12px;
            margin-top: 24px;
        }
        .btn {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        .btn-cancel {
            background: #333;
            color: #fff;
        }
        .btn-save {
            background: #fff;
            color: #000;
        }

        /* 删除按钮 */
        .delete-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(255, 0, 0, 0.8);
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 14px;
            z-index: 10;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .card:hover .delete-btn {
            opacity: 1;
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .card { width: 30%; } /* 平板一行3个 */
        }
        @media (max-width: 480px) {
            .card { width: 48%; } /* 手机一行2个 */
        }
    </style>
</head>
<body>

    <header>
        <h1>带派游戏</h1>
    </header>

    <div class="grid" id="gameGrid">
        <!-- 卡片将通过 JS 渲染在这里 -->
    </div>

    <!-- 添加游戏弹窗 -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <h2>添加新游戏</h2>
            <div class="form-group">
                <label>游戏名称</label>
                <input type="text" id="inputTitle" placeholder="例如：黑神话悟空">
            </div>
            <div class="form-group">
                <label>图片链接 (URL)</label>
                <input type="text" id="inputImage" placeholder="https://... (留空使用默认图)">
            </div>
            <div class="form-group">
                <label>游戏链接</label>
                <input type="text" id="inputUrl" placeholder="https://...">
            </div>
            <div class="form-group">
                <label>描述 (可选)</label>
                <textarea id="inputDesc" rows="2" placeholder="简单介绍一下..."></textarea>
            </div>
            <div class="btn-group">
                <button class="btn btn-cancel" onclick="closeModal()">取消</button>
                <button class="btn btn-save" onclick="saveGame()">保存</button>
            </div>
        </div>
    </div>

    <script>
        // --- 数据管理 ---
        const defaultImg = 'https://via.placeholder.com/400x400/333333/666666?text=GAME'; // 默认正方形占位图
        let games = JSON.parse(localStorage.getItem('daipai_games')) || [
            // 初始示例数据
            {
                id: 1,
                title: '游戏库',
                url: 'https://twoyears666.github.io/game',
                image: 'https://twoyears666.github.io/game/ios.png',
                desc: '点击进入游戏库'
            }
        ];

        const grid = document.getElementById('gameGrid');
        const modal = document.getElementById('modalOverlay');

        // --- 渲染函数 ---
        function renderGames() {
            grid.innerHTML = '';

            // 渲染已有的游戏
            games.forEach(game => {
                const card = document.createElement('a');
                card.className = 'card';
                card.href = game.url;
                card.target = '_blank';

                const imgUrl = game.image ? game.image : defaultImg;

                card.innerHTML = `
                    <div class="card-img-container">
                        <img src="${imgUrl}" class="card-img" alt="${game.title}" onerror="this.src='${defaultImg}'">
                    </div>
                    <div class="card-info">
                        <div class="card-title">${game.title}</div>
                        <div class="card-desc">${game.desc || '暂无描述'}</div>
                    </div>
                    <div class="delete-btn" onclick="deleteGame(event, ${game.id})">×</div>
                `;
                grid.appendChild(card);
            });

            // 渲染“添加”按钮
            const addCard = document.createElement('div');
            addCard.className = 'card add-card';
            addCard.onclick = openModal;
            addCard.innerHTML = `
                <div class="add-icon">+</div>
                <div class="add-text">添加游戏</div>
            `;
            grid.appendChild(addCard);
        }

        // --- 弹窗逻辑 ---
        function openModal() {
            modal.classList.add('active');
            document.getElementById('inputTitle').value = '';
            document.getElementById('inputImage').value = '';
            document.getElementById('inputUrl').value = '';
            document.getElementById('inputDesc').value = '';
        }

        function closeModal() {
            modal.classList.remove('active');
        }

        // --- 保存新游戏 ---
        function saveGame() {
            const title = document.getElementById('inputTitle').value.trim();
            const image = document.getElementById('inputImage').value.trim();
            const url = document.getElementById('inputUrl').value.trim();
            const desc = document.getElementById('inputDesc').value.trim();

            if (!title || !url) {
                alert('请填写名称和链接！');
                return;
            }

            const newGame = {
                id: Date.now(),
                title,
                image,
                url,
                desc
            };

            games.push(newGame);
            localStorage.setItem('daipai_games', JSON.stringify(games));
            renderGames();
            closeModal();
        }

        // --- 删除游戏 ---
        function deleteGame(e, id) {
            e.preventDefault();
            if(confirm('确定要删除这个游戏吗？')) {
                games = games.filter(g => g.id !== id);
                localStorage.setItem('daipai_games', JSON.stringify(games));
                renderGames();
            }
        }

        // --- PWA Manifest ---
        const manifest = {
            name: "带派游戏",
            short_name: "带派游戏",
            start_url: ".",
            display: "standalone",
            background_color: "#121212",
            theme_color: "#121212",
            icons: [
                {
                    src: "icon.png",
                    sizes: "512x512",
                    type: "image/png"
                }
            ]
        };
        const stringManifest = JSON.stringify(manifest);
        const blob = new Blob([stringManifest], {type: 'application/json'});
        const manifestURL = URL.createObjectURL(blob);
        document.querySelector('link[rel="manifest"]').setAttribute('href', manifestURL);

        // 初始化
        renderGames();

    </script>
</body>
</html>
