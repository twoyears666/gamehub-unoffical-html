<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>带派游戏</title>

    <!-- PWA 配置 -->
    <meta name="theme-color" content="#121212">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="带派游戏">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://twoyears666.github.io/game/ios.png">

    <style>
        /* --- 基础重置 --- */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #121212;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- 导航栏 --- */
        .navbar {
            height: 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            background-color: rgba(18, 18, 18, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-bottom: 1px solid #333;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        .nav-left { font-size: 1.2rem; font-weight: 800; letter-spacing: 0.5px; }
        
        /* 导航栏按钮组 */
        .nav-right {
            display: flex;
            gap: 15px; /* 按钮间距 */
        }
        .nav-right a, .nav-right .login-btn {
            color: #aaa;
            text-decoration: none;
            font-size: 0.9rem;
            padding: 6px 12px;
            border-radius: 8px;
            transition: all 0.2s;
            cursor: pointer;
            border: none;
            background: transparent;
        }
        .nav-right a:hover, .nav-right .login-btn:hover { 
            background: #333; 
            color: #fff; 
        }

        /* --- 主内容区 --- */
        .main-content {
            flex: 1;
            padding: 30px;
            padding-bottom: env(safe-area-inset-bottom);
        }

        /* --- 网格布局 --- */
        .grid {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            justify-content: flex-start;
        }

        /* --- 卡片样式 (超大正方形) --- */
        .card {
            width: 220px;
            aspect-ratio: 1 / 1;
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            color: white;
            transition: transform 0.2s;
            position: relative;
            overflow: hidden;
            background-color: #1e1e1e; 
            border: 1px solid #333;
        }
        .card:active { transform: scale(0.96); }

        /* --- 图片作为背景 --- */
        .card-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover; 
            background-position: center;
            z-index: 0;
        }

        /* --- 遮罩层 --- */
        .card-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.8));
            z-index: 1;
        }

        /* --- 文字内容 --- */
        .card-content {
            position: relative;
            z-index: 2;
            text-align: center;
            width: 90%;
        }

        .card-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 8px; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
        .card-desc { font-size: 0.9rem; color: #ddd; text-shadow: 0 1px 2px rgba(0,0,0,0.8); }

        /* --- 添加按钮特殊样式 --- */
        .add-card {
            background: #1e1e1e;
            border: 2px dashed #444;
        }
        .add-icon { font-size: 60px; color: #666; margin-bottom: 15px; font-weight: 300; }
        .add-text { font-size: 1.1rem; color: #888; }

        /* --- 响应式微调 --- */
        @media (max-width: 500px) {
            .card { width: 180px; }
        }

        /* --- 登录弹窗样式 --- */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.7);
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background-color: #1e1e1e;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 80%;
            border: 1px solid #333;
        }
        .modal-title {
            font-size: 1.5rem;
            margin-bottom: 10px;
            font-weight: bold;
        }
        .modal-desc {
            color: #999;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>

    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="nav-left">带派游戏</div>
        <div class="nav-right">
            <a href="#">主界面</a>
            <a href="https://github.com/twoyears666/gamehub-unoffical-html/tree/main" target="_blank">GitHub</a>
            <!-- 新增登录按钮 -->
            <button class="login-btn" onclick="handleLoginClick()">登录</button>
        </div>
    </nav>

    <!-- 主内容 -->
    <main class="main-content">
        <div class="grid" id="gameGrid">
            <!-- 默认游戏库卡片 -->
            <a href="https://twoyears666.github.io/game" class="card">
                <div class="card-bg" style="background-image: url('https://twoyears666.github.io/game/ios.png');"></div>
                <div class="card-overlay"></div>
                <div class="card-content">
                    <div class="card-title">游戏库</div>
                    <div class="card-desc">点击进入游戏库</div>
                </div>
            </a>

            <!-- 添加按钮 -->
            <div class="card add-card" onclick="addNewGame()">
                <div class="add-icon">+</div>
                <div class="add-text">添加游戏</div>
            </div>
        </div>
    </main>

    <!-- 登录弹窗 -->
    <div id="loginModal" class="modal">
        <div class="modal-content">
            <div class="modal-title">Try again later</div>
            <div class="modal-desc">请稍后再试</div>
        </div>
    </div>

    <script>
        // 用于存储第一次点击的时间
        let firstClickTime = null;

        function handleLoginClick() {
            const modal = document.getElementById('loginModal');
            modal.style.display = 'flex'; // 显示弹窗

            // 检查是否在10秒内有第一次点击
            if (firstClick 10000) {
                // 如果在10秒内再次点击，跳转到目标链接
                window.location.href = "https://www.youtube.com/watch?v=dQw4w9WgXcQ";
            } else {
                // 否则记录当前时间，作为第一次点击
                firstClickTime = new Date().getTime();
                
                // 设置一个定时器，10秒后重置点击状态
                setTimeout(() => {
                    if (firstClickTime === new Date().getTime() - 10000) {
                        firstClickTime = null;
                    }
                }, 10000);
            }
        }

        // 点击弹窗外区域关闭弹窗
        window.onclick = function(event) {
            const modal = document.getElementById('loginModal');
            if (event.target == modal) {
                modal.style.display = "none";
            }
        }

        function addNewGame() {
            const name = prompt("请输入游戏名称:");
            if (!name) return;

            const url = prompt("请输入游戏跳转链接 (https://...):");
            if (!url) return;

            let imgUrl = prompt("请输入图标链接 (https://...):");
            if (!imgUrl) {
                imgUrl = "linear-gradient(135deg, #333, #111)"; 
            }

            const grid = document.getElementById('gameGrid');
            const newLink = document.createElement('a');
            newLink.className = 'card';
            newLink.href = url;
            newLink.target = '_blank';

            let bgStyle = imgUrl.startsWith('http') 
                ? `background-image: url('${imgUrl}');` 
                : `background: ${imgUrl};`;

            newLink.innerHTML = `
                <div class="card-bg" style="${bgStyle}"></div>
                <div class="card-overlay"></div>
                <div class="card-content">
                    <div class="card-title">${name}</div>
                    <div class="card-desc">点击启动</div>
                </div>
            `;

            grid.insertBefore(newLink, grid.lastElementChild);
        }

        // PWA Manifest 注入
        const manifest = {
            "name": "带派游戏",
            "short_name": "带派游戏",
            "start_url": ".",
            "display": "standalone",
            "background_color": "#121212",
            "theme_color": "#121212",
            "icons": [
                { "src": "icon.png", "sizes": "192x192", "type": "image/png" },
                { "src": "icon.png", "sizes": "512x512", "type": "image/png" }
            ]
        };
        const stringManifest = JSON.stringify(manifest);
        const blob = new Blob([stringManifest], {type: 'application/json'});
        const manifestURL = URL.createObjectURL(blob);
        document.querySelector('#webManifest').setAttribute('href', manifestURL);
    </script>
</body>
</html>
