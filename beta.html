<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>带派游戏</title>
<!-- PWA 配置 -->
<meta name="theme-color" content="#121212">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="带派游戏">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="apple-touch-icon" href="https://twoyears666.github.io/game/ios.png">
<style>
/* --- 基础重置 --- */
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #121212; color: #ffffff; min-height: 100vh; display: flex; flex-direction: column; }

/* --- 导航栏 --- */
.navbar { height: 60px; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; background-color: rgba(18, 18, 18, 0.95); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border-bottom: 1px solid #333; position: sticky; top: 0; z-index: 100; }
.nav-left { font-size: 1.2rem; font-weight: 800; letter-spacing: 0.5px; }
.nav-right { display: flex; gap: 15px; }
.nav-right a, .nav-right .login-btn { color: #aaa; text-decoration: none; font-size: 0.9rem; padding: 6px 12px; border-radius: 8px; transition: all 0.2s; cursor: pointer; border: none; background: transparent; }
.nav-right a:hover, .nav-right .login-btn:hover { background: #333; color: #fff; }

/* --- 主内容区 --- */
.main-content { flex: 1; padding: 30px; padding-bottom: env(safe-area-inset-bottom); }

/* --- 网格布局 --- */
.grid { display: flex; flex-wrap: wrap; gap: 30px; justify-content: flex-start; position: relative; }

/* --- 卡片样式 (超大正方形) --- */
.card { width: 220px; aspect-ratio: 1 / 1; border-radius: 30px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-decoration: none; color: white; transition: transform 0.2s; position: relative; overflow: hidden; background-color: #1e1e1e; border: 1px solid #333; }
.card:active { transform: scale(0.96); }

/* --- 图片作为背景 --- */
.card-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-size: cover; background-position: center; z-index: 0; }

/* --- 遮罩层 --- */
.card-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(to bottom, rgba(0,0,0,0.2), rgba(0,0,0,0.8)); z-index: 1; }

/* --- 文字内容 --- */
.card-content { position: relative; z-index: 2; text-align: center; width: 90%; }
.card-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 8px; text-shadow: 0 2px 4px rgba(0,0,0,0.8); }
.card-desc { font-size: 0.9rem; color: #ddd; text-shadow: 0 1px 2px rgba(0,0,0,0.8); }

/* --- 添加按钮特殊样式 --- */
.add-card { background: #1e1e1e; border: 2px dashed #444; }
.add-icon { font-size: 60px; color: #666; margin-bottom: 15px; font-weight: 300; }
.add-text { font-size: 1.1rem; color: #888; }

/* --- 响应式微调 --- */
@media (max-width: 500px) { .card { width: 180px; } }

/* --- 登录弹窗样式 --- */
.modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.7); justify-content: center; align-items: center; }
.modal-content { background-color: #1e1e1e; padding: 40px; border-radius: 20px; text-align: center; max-width: 80%; border: 1px solid #333; }
.modal-title { font-size: 1.5rem; margin-bottom: 10px; font-weight: bold; }
.modal-desc { color: #999; font-size: 0.9rem; }

/* --- 新增：右侧展开菜单样式 --- */
.dropdown-container {
  position: relative;
  width: 100%;
  height: 100%;
}

/* 菜单样式：修改为白色文字，无下划线 */
.dropdown-menu {
  display: none;
  position: absolute;
  left: 100%; /* 贴在卡片右侧 */
  top: 0;
  width: 320px;
  background-color: #2a2a2a; /* 深灰色背景以突出白色文字 */
  border-radius: 15px;
  box-shadow: 5px 5px 20px rgba(0,0,0,0.5);
  padding: 20px;
  z-index: 10;
  border: 1px solid #444;
  max-height: 80vh;
  overflow-y: auto;
}

/* 链接样式：白色，无下划线，居左 */
.dropdown-menu a {
  color: #ffffff !important; /* 强制白色 */
  text-decoration: none; /* 去除下划线 */
  display: block;
  padding: 12px 15px;
  margin: 5px 0;
  border-radius: 8px;
  font-size: 0.95rem;
  text-align: left;
  transition: 0.2s;
}

/* 鼠标悬停效果 */
.dropdown-menu a:hover {
  background-color: #444;
  color: #fff !important;
}

/* 二级标题样式 */
.dropdown-menu h2 {
  margin: 15px 0 10px 0;
  color: #fff;
  font-size: 1.1rem;
  font-weight: 600;
}
</style>
</head>
<body>

<!-- 导航栏 -->
<nav class="navbar">
  <div class="nav-left">带派游戏</div>
  <div class="nav-right">
    <a href="#">主界面</a>
    <a href="https://github.com/twoyears666/gamehub-unoffical-html/tree/main" target="_blank">GitHub</a>
    <button class="login-btn" onclick="handleLoginClick()">登录</button>
  </div>
</nav>

<!-- 主内容 -->
<main class="main-content">
  <div class="grid" id="gameGrid">

    <!-- 修改后的游戏库卡片：点击右侧展开 -->
    <div class="dropdown-container">
      <!-- 卡片本身 -->
      <div class="card" onclick="toggleDropdown(this)">
        <div class="card-bg" style="background-image: url('https://twoyears666.github.io/game/ios.png');"></div>
        <div class="card-overlay"></div>
        <div class="card-content">
          <div class="card-title">游戏库</div>
          <div class="card-desc">点击向右展开</div>
        </div>
      </div>

      <!-- 展开后的内容 (向右) -->
      <div class="dropdown-menu">
        <a href="https://twoyears666.github.io/game/mc1.12.html">1.12-can't change language-无汉化</a>
        <a href="https://twoyears666.github.io/game/mc1.8.8.html">1.8.8-can change language-有汉化</a>
        <a href="https://twoyears666.github.io/game/mc1.5.2.html">1.5.2-can't change language-无汉化</a>
        <h2>其他</h2>
        <a href="https://twoyears666.github.io/snowrider3D">snowrider3D</a>
      </div>
    </div>

    <!-- 添加按钮 (保持不变) -->
    <div class="card add-card" onclick="addNewGame()">
      <div class="add-icon">+</div>
      <div class="add-text">添加游戏</div>
    </div>

  </div>
</main>

<!-- 登录弹窗 -->
<div id="loginModal" class="modal">
  <div class="modal-content">
    <div class="modal-title">Try again later</div>
    <div class="modal-desc">请稍后再试</div>
  </div>
</div>

<script>
// 保持原有的JS逻辑不变
let firstClickTime = null;
function handleLoginClick() {
  const modal = document.getElementById('loginModal');
  modal.style.display = 'flex';
  if (firstClickTime && new Date().getTime() - firstClickTime < 10000) {
    window.location.href = "https://www.youtube.com/watch?v=dQw4w9WgXcQ";
  } else {
    firstClickTime = new Date().getTime();
    setTimeout(() => { firstClickTime = null; }, 10000);
  }
}
window.onclick = function(event) {
  const modal = document.getElementById('loginModal');
  if (event.target == modal) { modal.style.display = "none"; }
}

function addNewGame() {
  const name = prompt("请输入游戏名称:");
  if (!name) return;
  const url = prompt("请输入游戏跳转链接 (https://...):");
  if (!url) return;
  let imgUrl = prompt("请输入图标链接 (https://...):");
  if (!imgUrl) { imgUrl = "linear-gradient(135deg, #333, #111)"; }
  const grid = document.getElementById('gameGrid');
  const newLink = document.createElement('a');
  newLink.className = 'card';
  newLink.href = url;
  newLink.target = '_blank';
  let bgStyle = imgUrl.startsWith('http') ? `background-image: url('${imgUrl}');` : `background: ${imgUrl};`;
  newLink.innerHTML = ` 
    <div class="card-bg" style="${bgStyle}"></div> 
    <div class="card-overlay"></div> 
    <div class="card-content"> 
      <div class="card-title">${name}</div> 
      <div class="card-desc">点击启动</div> 
    </div> `;
  grid.insertBefore(newLink, grid.lastElementChild);
}

// 新增：控制下拉菜单显示隐藏的函数
function toggleDropdown(cardElement) {
  const menu = cardElement.parentElement.querySelector('.dropdown-menu');
  // 隐藏所有其他菜单（可选，防止多个同时打开）
  document.querySelectorAll('.dropdown-menu').forEach(m => {
    if (m !== menu) m.style.display = 'none';
  });
  // 切换当前菜单
  menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
}

// 点击页面其他地方关闭菜单
document.addEventListener('click', function(e) {
  if (!e.target.closest('.dropdown-container')) {
    document.querySelectorAll('.dropdown-menu').forEach(m => m.style.display = 'none');
  }
});
</script>

</body>
</html>
